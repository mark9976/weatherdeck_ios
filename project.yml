name: WeatherDeck
options:
  bundleIdPrefix: com.mark9976
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "6.0"
  DEVELOPMENT_TEAM: "6W7CGPT3T5"

targets:
  WeatherDeck:
    type: application
    platform: iOS
    sources:
      - WeatherDeck
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.mark9976.weatherdeck
      INFOPLIST_FILE: WeatherDeck/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      TARGETED_DEVICE_FAMILY: 1
      SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    info:
      path: WeatherDeck/Info.plist
      properties:
        CFBundleDisplayName: JustWeather
        CFBundleShortVersionString: "1.0"
        CFBundleIconName: AppIcon
        NSLocationWhenInUseUsageDescription: "JustWeather uses your location to show local weather conditions, forecasts, and radar."
        UILaunchScreen: {}