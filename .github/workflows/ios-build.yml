name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_26.0.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.1.app
          elif [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          else
            LATEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
            sudo xcode-select -s "$LATEST"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set build number
        run: |
          echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Generate app icon
        run: |
          pip3 install Pillow --break-system-packages -q
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw
          import json, os
          W, H = 1024, 1024
          img = Image.new('RGB', (W, H))
          draw = ImageDraw.Draw(img)
          for y in range(H):
              t = y / H
              r = int(11 + (20 - 11) * t)
              g = int(15 + (27 - 15) * t)
              b = int(20 + (36 - 20) * t)
              draw.line([(0, y), (W, y)], fill=(r, g, b))
          for radius in range(320, 0, -2):
              a = int(30 * (1 - radius / 320))
              draw.ellipse([W//2-radius, H//2-radius+40, W//2+radius, H//2+radius+40],
                           fill=(29+a, 70+a, 180+a//2))
          cc = (100, 120, 145)
          draw.ellipse([240,160,560,380], fill=cc)
          draw.ellipse([380,120,780,360], fill=cc)
          draw.ellipse([180,220,480,400], fill=cc)
          draw.ellipse([500,180,760,380], fill=cc)
          draw.rectangle([200,300,760,380], fill=cc)
          hl = (130, 150, 175)
          draw.ellipse([280,170,540,340], fill=hl)
          draw.ellipse([420,140,720,320], fill=hl)
          draw.polygon([(480,320),(380,540),(460,540),(400,820),(600,500),(520,500),(580,320)],
                       fill=(255,220,60))
          draw.polygon([(490,350),(410,530),(470,530),(420,780),(570,510),(520,510),(560,350)],
                       fill=(255,255,180))
          for dx, dy in [(280,420),(340,460),(650,430),(710,470),(300,520),(680,540)]:
              draw.ellipse([dx-6,dy-6,dx+6,dy+12], fill=(80,160,230))
          d = 'WeatherDeck/Assets.xcassets/AppIcon.appiconset'
          img.save(os.path.join(d, 'AppIcon.png'), 'PNG')
          json.dump({
              "images": [{"filename":"AppIcon.png","idiom":"universal","platform":"ios","size":"1024x1024"}],
              "info": {"version":1,"author":"xcode"}
          }, open(os.path.join(d, 'Contents.json'), 'w'), indent=2)
          print('Icon generated')
          PYEOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Inject build number and icon name into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ env.BUILD_NUMBER }}" WeatherDeck/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ env.BUILD_NUMBER }}" WeatherDeck/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" WeatherDeck/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" WeatherDeck/Info.plist
          echo "Build number: ${{ env.BUILD_NUMBER }}"
          echo "Info.plist contents:"
          cat WeatherDeck/Info.plist

      - name: Install signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/distribution.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -hex 12)
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/weatherdeck.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROV_PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Build and archive
        run: |
          xcodebuild archive \
            -project WeatherDeck.xcodeproj \
            -scheme WeatherDeck \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/WeatherDeck.xcarchive \
            DEVELOPMENT_TEAM=6W7CGPT3T5 \
            PROVISIONING_PROFILE_SPECIFIER=${{ env.PROV_PROFILE_UUID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>6W7CGPT3T5</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.mark9976.weatherdeck</key>
              <string>${{ env.PROV_PROFILE_UUID }}</string>
            </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/WeatherDeck.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          printenv APPSTORE_PRIVATE_KEY > ~/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/WeatherDeck.ipa \
            -t ios \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID" \
            --show-progress

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WeatherDeck-IPA
          path: ${{ runner.temp }}/export/WeatherDeck.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true