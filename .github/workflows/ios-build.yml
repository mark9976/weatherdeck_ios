name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project WeatherDeck.xcodeproj \
            -scheme WeatherDeck \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package artifact
        if: success()
        run: |
          cd build/Build/Products/Release-iphonesimulator
          zip -r ../../../../WeatherDeck-sim.zip WeatherDeck.app

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WeatherDeck-Simulator
          path: WeatherDeck-sim.zip
          retention-days: 30
